<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pangolingo | Registro de usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-shell">
        <main class="card p-4 admin-panel">
            <div class="panel-header admin-header">
                <div>
                    <p class="eyebrow">Panel privado</p>
                    <h1>Registro de usuarios</h1>
                    <p class="lead">Consulta las cuentas registradas y la clave guardada como hash bcrypt.</p>
                </div>
                <a class="btn btn-outline-light" href="/">Volver</a>
            </div>

            <form id="adminForm" class="admin-access">
                <label for="adminKey" class="form-label">Clave de administrador</label>
                <div class="admin-access-row">
                    <input type="password" id="adminKey" class="form-control" placeholder="pangolingo-admin" required>
                    <button type="submit" class="btn btn-primary">Ver registros</button>
                </div>
            </form>

            <div id="adminSummary" class="admin-summary d-none"></div>

            <div class="admin-table-wrap">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Correo</th>
                            <th>Clave guardada</th>
                            <th>XP</th>
                            <th>Racha</th>
                            <th>Lecciones</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr>
                            <td colspan="7" class="empty-state">Ingresa la clave para cargar los registros.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const form = document.getElementById('adminForm');
        const keyInput = document.getElementById('adminKey');
        const summary = document.getElementById('adminSummary');
        const tableBody = document.getElementById('usersTableBody');

        function escapeHtml(value) {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function renderUsers(users) {
            if (!users.length) {
                tableBody.innerHTML = '<tr><td colspan="7" class="empty-state">No hay usuarios registrados.</td></tr>';
                return;
            }

            tableBody.innerHTML = users.map((user) => `
                <tr>
                    <td>${escapeHtml(user.id)}</td>
                    <td>${escapeHtml(user.nombre)}</td>
                    <td>${escapeHtml(user.correo)}</td>
                    <td><code class="password-hash">${escapeHtml(user.passwordHash)}</code></td>
                    <td>${escapeHtml(user.xp)}</td>
                    <td>${escapeHtml(user.streak)}</td>
                    <td>${escapeHtml((user.completed || []).join(', '))}</td>
                </tr>
            `).join('');
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            tableBody.innerHTML = '<tr><td colspan="7" class="empty-state">Cargando registros...</td></tr>';
            summary.classList.add('d-none');

            const response = await fetch('/api/admin/users', {
                headers: { 'x-admin-key': keyInput.value.trim() }
            });
            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
                tableBody.innerHTML = `<tr><td colspan="7" class="empty-state">${escapeHtml(data.message || 'No se pudieron cargar los registros.')}</td></tr>`;
                return;
            }

            summary.textContent = `Usuarios registrados: ${data.total}`;
            summary.classList.remove('d-none');
            renderUsers(data.users || []);
        });
    </script>
</body>
</html>
