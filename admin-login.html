<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pangolingo | Login Administrador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-shell">
        <main class="card p-4 admin-panel">
            <div class="panel-header admin-header">
                <div>
                    <p class="eyebrow">Panel privado</p>
                    <h1>Acceso Administrador</h1>
                    <p class="lead">Ingresa tus credenciales para acceder al panel de administración.</p>
                </div>
                <a class="btn btn-outline-light" href="/">Volver</a>
            </div>

            <form id="adminLoginForm" class="admin-access">
                <div class="mb-3">
                    <label for="adminEmail" class="form-label">Correo electrónico</label>
                    <input type="email" id="adminEmail" class="form-control" placeholder="admin@ejemplo.com" required aria-label="Correo de administrador">
                </div>
                
                <div class="mb-3">
                    <label for="adminPassword" class="form-label">Contraseña</label>
                    <input type="password" id="adminPassword" class="form-control" placeholder="••••••••" required aria-label="Contraseña de administrador">
                </div>

                <div id="loginError" class="alert alert-danger d-none"></div>
                
                <button type="submit" class="btn btn-primary w-100">Iniciar sesión</button>
            </form>

            <div class="mt-3 text-center">
                <small class="text-muted">Solo administradores autorizados</small>
            </div>
        </main>
    </div>

    <script>
        const form = document.getElementById('adminLoginForm');
        const emailInput = document.getElementById('adminEmail');
        const passwordInput = document.getElementById('adminPassword');
        const errorDiv = document.getElementById('loginError');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            errorDiv.classList.add('d-none');
            
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Iniciando sesión...';

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: emailInput.value.trim(),
                        password: passwordInput.value
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Error al iniciar sesión');
                }

                // Guardar token en localStorage
                localStorage.setItem('adminToken', data.token);
                localStorage.setItem('adminName', data.admin.name);
                localStorage.setItem('adminEmail', data.admin.email);

                // Redirigir al panel de administración
                window.location.href = '/admin.html';

            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('d-none');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Iniciar sesión';
            }
        });
    </script>
</body>
</html>
