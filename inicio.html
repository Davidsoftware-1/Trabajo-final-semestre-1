<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pangolingo | Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #ffffff;
            color: #111111;
            font-family: Arial, Helvetica, sans-serif;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 22px;
            border-bottom: 1px solid #e5e5e5;
        }

        .topbar .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .topbar .user-info {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 0.95rem;
        }

        #contenido {
            padding: 24px 22px;
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="brand">🐾 Pangolingo</div>
        <div class="user-info">
            <span id="userName"></span>
            <button id="logoutBtn" class="btn btn-outline-dark btn-sm">Cerrar sesión</button>
        </div>
    </header>

    <main id="contenido">
        <!-- Página en blanco: aquí vamos a rellenar el contenido -->
    </main>

    <script>
        const STORAGE_KEY = "pangolingo-user";
        const PROGRESS_KEY = "pangolingo-progress";
        const savedUser = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");

        if (!savedUser) {
            window.location.href = "index.html";
        } else {
            document.getElementById("userName").textContent = savedUser.nombre || savedUser.correo;
        }

        document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.removeItem(STORAGE_KEY);
            localStorage.removeItem(PROGRESS_KEY);
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
